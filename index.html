<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raheemiyya hadiyyah face to face Campaign</title>

  <!-- Tailwind & Cropper -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Latin:wght@100..800&family=Anek+Malayalam:wght@100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Montserrat", sans-serif;
    }

    /* Poster wrapper — always relative so children can be absolutely positioned */
    #posterphoto {
      position: relative;
      width: 100%;
      display: inline-block;
      line-height: 0; /* removes inline gap under img */
    }

    #posterBg {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      border-radius: 12px;
    }

    /* User photo — positioned relative to posterphoto */
    #userPhoto {
      position: absolute;
      top: 45%;
      left: 10%;
      width: 80%;
      aspect-ratio: 16 / 8;
      object-fit: cover;
      border-radius: 20px;
      transform: translateY(-50%);
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      z-index: 2;
      display: none;
    }

    /* Name label */
    #userName {
      position: absolute;
      bottom: 35%;
      left: 50%;
      transform: translateX(-50%);
      color: #92356e;
      font-weight: 600;
      font-size: clamp(12px, 2.5vw, 19px); /* fluid scaling */
      text-align: center;
      line-height: 1.2;
      font-family: 'Anek Malayalam', sans-serif;
      white-space: nowrap;
      max-width: 80%;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 3;
    }

    #copyrightTag {
      position: absolute;
      bottom: 6px;
      right: 10px;
      font-size: 10px;
      color: black;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.5px;
      user-select: none;
      z-index: 3;
    }

    /* ── Mobile overrides (≤ 640px) ── */
    @media (max-width: 640px) {
      /* Stack layout: poster on top, controls below */
      .main-card {
        flex-direction: column !important;
      }

      /* Poster takes full width on mobile */
      #posterArea {
        width: 100% !important;
        padding: 0 !important;
      }

      /* Controls full-width on mobile */
      .controls-panel {
        width: 100% !important;
      }

      /* Slightly smaller name on small screens */
      #userName {
        font-size: clamp(10px, 3.5vw, 16px);
        bottom: 34%;
      }
    }
  </style>
</head>

<body>
<div class="bg-gray-100 flex justify-center items-center min-h-screen p-4">
  <div class="main-card bg-white rounded-3xl shadow-lg p-4 md:p-6 w-full max-w-5xl flex flex-col md:flex-row gap-6">

    <!-- Poster Preview -->
    <div id="posterArea" class="relative w-full md:w-[60%] flex justify-center items-center overflow-hidden p-0 md:p-4 rounded-2xl">
      <div id="posterphoto">
        <img id="posterBg" src="raheemiyya_campaign.jpg" alt="Poster Background" />
        <img id="userPhoto" alt="User Photo" />
        <span id="userName"></span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-panel flex flex-col justify-center items-center gap-4 w-full md:w-[40%]">

      <input id="nameInput" type="text" placeholder="Enter Your Name"
        class="border border-gray-300 rounded-full px-4 py-2 w-64 max-w-full text-center focus:outline-none focus:ring-2 focus:ring-pink-500">

      <button id="uploadBtn"
        class="bg-pink-600 text-white px-6 py-2 rounded-full hover:bg-pink-700 transition text-sm md:text-base">
        Create with your photo
      </button>

      <button id="downloadBtn"
        class="bg-green-600 text-white px-6 py-2 rounded-full hover:bg-green-700 transition text-sm md:text-base">
        Download
      </button>

      <div class="text-sm text-gray-500 text-center">
        Developed By <a href="https://www.instagram.com/faris_fariz__?igsh=MXVjYXAyMG82enVybQ==" class="text-pink-600 hover:underline">@faris_fariz__</a>
      </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" accept="image/*" class="hidden">

    <!-- Crop Modal -->
    <div id="cropModal" class="fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center hidden z-50">
      <div class="bg-white rounded-xl shadow-2xl w-[95%] sm:w-[90%] md:w-[70%] max-w-2xl p-4 relative flex flex-col items-center overflow-hidden">
        <button id="closeModal" class="absolute top-2 right-3 text-gray-500 hover:text-gray-800 text-2xl">&times;</button>
        <h3 class="text-lg md:text-xl font-semibold mb-3 text-center">Crop Your Image</h3>
        <div class="overflow-hidden flex justify-center items-center w-full">
          <img id="cropImage" class="max-h-[60vh] object-contain" alt="Crop Target">
        </div>
        <div class="mt-4 flex justify-center w-full">
          <button id="applyCrop" class="bg-green-600 text-white px-6 py-2 rounded-full hover:bg-green-700 transition w-full sm:w-auto">
            Apply Crop
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- JavaScript -->
<script>
  const uploadBtn   = document.getElementById("uploadBtn");
  const fileInput   = document.getElementById("fileInput");
  const cropModal   = document.getElementById("cropModal");
  const cropImage   = document.getElementById("cropImage");
  const closeModal  = document.getElementById("closeModal");
  const applyCrop   = document.getElementById("applyCrop");
  const userPhoto   = document.getElementById("userPhoto");
  const nameInput   = document.getElementById("nameInput");
  const userName    = document.getElementById("userName");
  const downloadBtn = document.getElementById("downloadBtn");
  const posterArea  = document.getElementById("posterphoto");
  let cropper;

  // Upload photo
  uploadBtn.addEventListener("click", () => fileInput.click());

  // Cropper setup
  fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      cropImage.src = reader.result;
      cropModal.classList.remove("hidden");
      if (cropper) cropper.destroy();
      setTimeout(() => {
        cropper = new Cropper(cropImage, {
          aspectRatio: 16 / 8,
          viewMode: 1,
          autoCropArea: 1,
        });
      }, 100);
    };
    reader.readAsDataURL(file);
  });

  // Apply crop
  applyCrop.addEventListener("click", () => {
    const canvas = cropper.getCroppedCanvas({
      width: 600,
      height: 300,
      imageSmoothingEnabled: true,
      imageSmoothingQuality: "high",
    });
    userPhoto.src = canvas.toDataURL("image/jpeg", 1.0);
    userPhoto.style.display = "block";
    cropModal.classList.add("hidden");
    cropper.destroy();
  });

  // Close modal
  closeModal.addEventListener("click", () => {
    cropModal.classList.add("hidden");
    if (cropper) cropper.destroy();
  });

  // Name update
  nameInput.addEventListener("input", () => {
    userName.textContent = nameInput.value.trim();
  });

  // HD Download — pure canvas draw, zero white borders
  downloadBtn.addEventListener("click", async () => {
    try {
      const bgImg   = document.getElementById("posterBg");
      const userImg = document.getElementById("userPhoto");

      const W = bgImg.naturalWidth;
      const H = bgImg.naturalHeight;

      const canvas = document.createElement("canvas");
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext("2d");

      // 1. Draw background poster
      ctx.drawImage(bgImg, 0, 0, W, H);

      // 2. Draw user photo if uploaded
      if (userImg && userImg.src && userImg.style.display !== "none") {
        const photoLeft   = W * 0.10;
        const photoWidth  = W * 0.80;
        const photoHeight = photoWidth / 2;
        const photoCenterY = H * 0.45;
        const photoTop    = photoCenterY - photoHeight / 2;
        const radius      = W * 0.04;

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(photoLeft + radius, photoTop);
        ctx.lineTo(photoLeft + photoWidth - radius, photoTop);
        ctx.quadraticCurveTo(photoLeft + photoWidth, photoTop, photoLeft + photoWidth, photoTop + radius);
        ctx.lineTo(photoLeft + photoWidth, photoTop + photoHeight - radius);
        ctx.quadraticCurveTo(photoLeft + photoWidth, photoTop + photoHeight, photoLeft + photoWidth - radius, photoTop + photoHeight);
        ctx.lineTo(photoLeft + radius, photoTop + photoHeight);
        ctx.quadraticCurveTo(photoLeft, photoTop + photoHeight, photoLeft, photoTop + photoHeight - radius);
        ctx.lineTo(photoLeft, photoTop + radius);
        ctx.quadraticCurveTo(photoLeft, photoTop, photoLeft + radius, photoTop);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(userImg, photoLeft, photoTop, photoWidth, photoHeight);
        ctx.restore();
      }

      // 3. Draw name text
      const nameText = document.getElementById("userName").textContent.trim();
      if (nameText) {
        const fontSize = Math.round(W * 0.045);
        ctx.font         = `600 ${fontSize}px 'Anek Malayalam', sans-serif`;
        ctx.fillStyle    = "#92356e";
        ctx.textAlign    = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(nameText, W / 2, H - H * 0.35);
      }

      // 4. Export exact poster size, no white borders
      canvas.toBlob((blob) => {
        const link = document.createElement("a");
        link.download = "raheemiyya_campaign.png";
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
      }, "image/png", 1.0);

    } catch (error) {
      console.error("Download failed:", error);
      alert("❌ Failed to export image. Try again.");
    }
  });
</script>
</body>
</html>
